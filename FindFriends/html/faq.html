<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ - FindFriends</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo">💫 FindFriends</h1>
                <div class="nav-menu">
                    <a href="../index.html" class="nav-link">Home</a>
                    <a href="../html/messages.html" class="nav-link">💬 Messages</a>
                    <a href="about.html" class="nav-link">About Us</a>
                    <a href="contact.html" class="nav-link">Contact</a>
                    <a href="faq.html" class="nav-link active">FAQ</a>
                    <a href="privacy.html" class="nav-link">Privacy</a>
                    <a href="terms.html" class="nav-link">Terms</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="page-container">
            <div class="page-header">
                <h1>❓ Frequently Asked Questions</h1>
                <p>Find answers to common questions about FindFriends</p>
            </div>

            <div class="faq-search">
                <input type="text" id="faq-search" placeholder="Search FAQ...">
            </div>

            <div class="faq-categories">
                <button class="faq-category-btn active" data-category="all">All</button>
                <button class="faq-category-btn" data-category="getting-started">Getting Started</button>
                <button class="faq-category-btn" data-category="features">Features</button>
                <button class="faq-category-btn" data-category="messaging">Messaging</button>
                <button class="faq-category-btn" data-category="privacy">Privacy & Security</button>
                <button class="faq-category-btn" data-category="troubleshooting">Troubleshooting</button>
            </div>

            <div id="faq-list">
                <!-- FAQ items will be generated here -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 FindFriends. All rights reserved. | <a href="privacy.html" style="color: var(--primary-color); text-decoration: none;">Privacy</a> | <a href="terms.html" style="color: var(--primary-color); text-decoration: none;">Terms</a></p>
    </footer>

    <script>
        const faqData = [
            {
                category: 'getting-started',
                question: 'How do I get started with FindFriends?',
                answer: 'Simply open the app, browse profiles, and start connecting! You can like profiles, send friend requests, and message people directly. All data is stored locally on your device.'
            },
            {
                category: 'getting-started',
                question: 'Do I need to create an account?',
                answer: 'No! FindFriends runs entirely in your browser with no server needed. Just open the app and start using it immediately. Your data is stored locally.'
            },
            {
                category: 'features',
                question: 'How do I filter profiles?',
                answer: 'Click the 🔍 Filters button in the top right. You can filter by age range, select multiple interests, and sort by different criteria. Click Apply Filters to see results.'
            },
            {
                category: 'features',
                question: 'What can I do with profiles?',
                answer: 'You can: ❤️ Like profiles, 👥 Add friends, 💬 Send messages, 🔍 Search by interests, 📊 View statistics, and 📱 Toggle between grid and list views.'
            },
            {
                category: 'features',
                question: 'Can I search for specific people?',
                answer: 'Yes! Use the search bar at the top to find profiles by name, location, interests, or keywords. Results update in real-time as you type.'
            },
            {
                category: 'messaging',
                question: 'How do I send a message?',
                answer: 'Click the 💬 Message button on any profile card, or navigate to the Messages page (💬 icon in navbar). Type your message and press Enter to send.'
            },
            {
                category: 'messaging',
                question: 'Where are my messages stored?',
                answer: 'All your messages are stored in your browser\'s local storage. They persist even if you close the app. Only you can see them - nothing is sent to a server.'
            },
            {
                category: 'messaging',
                question: 'How do I view all my conversations?',
                answer: 'Go to the Messages page (💬 in navbar) or click the 💬 message icon. You\'ll see all conversations in the sidebar with message previews.'
            },
            {
                category: 'privacy',
                question: 'Is my data private?',
                answer: 'Yes, completely! All data is processed and stored locally on your device. Nothing is sent to external servers. Read our Privacy Policy for details.'
            },
            {
                category: 'privacy',
                question: 'How is my data protected?',
                answer: 'Your data is stored in your browser\'s localStorage, which is isolated from other websites. We don\'t use external services or trackers.'
            },
            {
                category: 'privacy',
                question: 'Can I delete my data?',
                answer: 'Yes! You can clear your browser data or use your browser\'s developer tools to clear localStorage. Visit our Privacy Policy for more information.'
            },
            {
                category: 'troubleshooting',
                question: 'Why aren\'t profiles loading?',
                answer: 'Try refreshing the page (Ctrl+F5). If the issue persists, check that you\'re using a modern browser (Chrome, Firefox, Safari, Edge).'
            },
            {
                category: 'troubleshooting',
                question: 'My messages aren\'t saving!',
                answer: 'Make sure localStorage is enabled and you\'re not in Private/Incognito mode. Check your browser settings. In some cases, clearing cache helps.'
            },
            {
                category: 'troubleshooting',
                question: 'The styling looks wrong.',
                answer: 'Try clearing your browser cache (Ctrl+F5). If CSS still doesn\'t load, check that all files are in the correct folders. Try a different browser.'
            },
            {
                category: 'features',
                question: 'Can I switch between grid and list views?',
                answer: 'Yes! Click the ⊞/≡ toggle button in the stats bar. Grid view shows multiple cards per row, while list view shows one profile per row.'
            },
            {
                category: 'features',
                question: 'How many profiles are there?',
                answer: 'We have 12+ diverse profiles with different interests, ages, and locations. More profiles can be added easily.'
            },
            {
                category: 'messaging',
                question: 'Do real people respond to messages?',
                answer: 'No, responses are simulated for demonstration. In a production version, real users would respond. This is a preview/demo of the messaging system.'
            },
            {
                category: 'getting-started',
                question: 'Is FindFriends free?',
                answer: 'Yes, completely free! No subscriptions, no ads, no hidden charges. Just download and use.'
            },
            {
                category: 'privacy',
                question: 'Do you track my activity?',
                answer: 'No tracking whatsoever. We don\'t collect analytics, cookies, or any user data. Everything stays on your device.'
            },
            {
                category: 'troubleshooting',
                question: 'What browsers are supported?',
                answer: 'Chrome, Firefox, Safari, and Edge (latest versions). Mobile browsers: Chrome Mobile and Safari iOS.'
            }
        ];

        let currentCategory = 'all';

        function renderFAQ(category = 'all', searchTerm = '') {
            const container = document.getElementById('faq-list');
            let filtered = faqData;

            if (category !== 'all') {
                filtered = filtered.filter(item => item.category === category);
            }

            if (searchTerm) {
                filtered = filtered.filter(item =>
                    item.question.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.answer.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }

            container.innerHTML = filtered.map((item, index) => `
                <div class="faq-item" data-index="${index}">
                    <div class="faq-question">
                        <h3>${item.question}</h3>
                        <span class="faq-toggle">▼</span>
                    </div>
                    <div class="faq-answer">
                        <p>${item.answer}</p>
                    </div>
                </div>
            `).join('');

            // Add click listeners
            container.querySelectorAll('.faq-item').forEach(item => {
                item.querySelector('.faq-question').addEventListener('click', () => {
                    item.classList.toggle('open');
                });
            });
        }

        // Category filtering
        document.querySelectorAll('.faq-category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.faq-category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderFAQ(currentCategory, document.getElementById('faq-search').value);
            });
        });

        // Search
        document.getElementById('faq-search').addEventListener('input', (e) => {
            renderFAQ(currentCategory, e.target.value);
        });

        // Initial render
        renderFAQ();
    </script>
</body>
</html>
